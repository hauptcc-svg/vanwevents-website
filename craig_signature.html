<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .signature {
            font-size: 13px;
            color: #333;
            line-height: 1.6;
            width: 100%;
            max-width: 500px;
        }
        .signature-header {
            border-left: 4px solid #FF9F1C;
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .company-name {
            font-weight: bold;
            color: #0F1B2E;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .company-tagline {
            font-size: 11px;
            color: #1B9B9B;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .email {
            color: #1B9B9B;
            text-decoration: none;
            font-size: 12px;
        }
        .divider {
            border-top: 1px solid #E0E0E0;
            margin: 10px 0;
        }
        .contact-info {
            font-size: 12px;
            color: #666;
        }
        .contact-item {
            margin: 4px 0;
        }
        .website {
            color: #1B9B9B;
            text-decoration: none;
        }
        .website:hover {
            text-decoration: underline;
        }
        .icon {
            color: #FF9F1C;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="signature">
        <div class="signature-header">
            <div class="company-name">GreyMC</div>
            <div class="company-tagline">Grey Matter Consulting</div>
        </div>
        <div style="margin-bottom: 8px;">
            <a href="mailto:craig@greymc.co.za" class="email">craig@greymc.co.za</a>
        </div>
        <div class="divider"></div>
        <div class="contact-info">
            <div class="contact-item"><span class="icon">📞</span><a href="tel:+27815571278" style="color: #666; text-decoration: none;">+27 81 557 1278</a></div>
            <div class="contact-item"><span class="icon">🌐</span><a href="http://www.greymc.co.za" class="website">www.greymc.co.za</a></div>
        </div>
    </div>
</body>
</html>
