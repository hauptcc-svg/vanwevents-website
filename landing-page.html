<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanWEvents - MSC Cruise Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;700&display=swap');

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; }

        .hero-gradient {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 50%, #FDB833 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(253, 184, 51, 0.2) 0%, transparent 50%);
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slide-in {
            animation: slideInUp 0.8s ease-out forwards;
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 700; }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.3);
        }

        .card-hover {
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [expandedFaq, setExpandedFaq] = useState(0);
            const [newsletter, setNewsletter] = useState({ email: '', name: '', phone: '', interest: '' });
            const [contact, setContact] = useState({ email: '', name: '', phone: '', message: '' });
            const [newsletterSubmitted, setNewsletterSubmitted] = useState(false);
            const [contactSubmitted, setContactSubmitted] = useState(false);

            const faqs = [
                {
                    q: "What's included in the MSC cruise package?",
                    a: "Our MSC cruise packages include accommodation in your selected cabin, meals in the main dining rooms, access to onboard entertainment and activities, and use of most facilities. Additional charges may apply for specialty dining, beverage packages, and premium experiences."
                },
                {
                    q: "What are the cabin types available?",
                    a: "We offer a variety of cabin options including Inside Cabins, Ocean View Cabins, Balcony Cabins, and Suites. Each cabin comes with modern amenities, comfortable bedding, and en-suite bathrooms. Prices vary based on cabin location and size."
                },
                {
                    q: "What is your cancellation and refund policy?",
                    a: "Cancellations made more than 60 days before departure are eligible for a full refund. Cancellations between 30-60 days incur a 50% charge, and cancellations within 30 days are non-refundable. Travel insurance is recommended for additional protection."
                },
                {
                    q: "What payment options do you accept?",
                    a: "We accept all major credit cards (Visa, MasterCard, American Express) and local payment methods through our secure payment gateway. A deposit is required to secure your booking, with the balance due 60 days before departure."
                },
                {
                    q: "Do I need a passport for the cruise?",
                    a: "Yes, a valid passport is required for international cruises. Please ensure your passport is valid for at least 6 months beyond your travel dates. Some destinations may have visa requirements—please check with your local embassy."
                }
            ];

            const handleNewsletterSubmit = async (e) => {
                e.preventDefault();
                // In production, this would send to Resend API
                console.log('Newsletter signup:', newsletter);
                setNewsletterSubmitted(true);
                setTimeout(() => {
                    setNewsletter({ email: '', name: '', phone: '', interest: '' });
                    setNewsletterSubmitted(false);
                }, 3000);
            };

            const handleContactSubmit = async (e) => {
                e.preventDefault();
                // In production, this would send to Resend API
                console.log('Contact form:', contact);
                setContactSubmitted(true);
                setTimeout(() => {
                    setContact({ email: '', name: '', phone: '', message: '' });
                    setContactSubmitted(false);
                }, 3000);
            };

            return (
                <div className="w-full">
                    {/* Navigation */}
                    <nav className="bg-white shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center">
                                    <h1 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-500">VanWEvents</h1>
                                </div>
                                <div className="hidden md:flex gap-8">
                                    <a href="#cruise" className="text-gray-700 hover:text-orange-600 transition">Cruise</a>
                                    <a href="#experience" className="text-gray-700 hover:text-orange-600 transition">Experience</a>
                                    <a href="#pricing" className="text-gray-700 hover:text-orange-600 transition">Pricing</a>
                                    <a href="#faq" className="text-gray-700 hover:text-orange-600 transition">FAQ</a>
                                    <a href="#contact" className="text-gray-700 hover:text-orange-600 transition">Contact</a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="hero-gradient text-white relative z-10 py-20 md:py-32">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-20">
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div className="animate-slide-in">
                                    <h2 className="text-5xl md:text-6xl font-bold mb-6 leading-tight">Experience Luxury at Sea</h2>
                                    <p className="text-xl md:text-2xl mb-8 text-orange-50">Sail away on the MSC Fleet and create unforgettable memories with exclusive experiences.</p>
                                    <div className="flex gap-4">
                                        <a href="#newsletter" className="btn-primary text-white font-bold py-3 px-8 rounded-lg">Book Now</a>
                                        <a href="#contact" className="bg-white text-orange-600 font-bold py-3 px-8 rounded-lg hover:bg-gray-100 transition">Learn More</a>
                                    </div>
                                </div>
                                <div className="animate-fade-in">
                                    <div className="bg-white rounded-lg overflow-hidden shadow-2xl">
                                        <img src="https://via.placeholder.com/500x400/FF6B35/ffffff?text=MSC+Cruise" alt="MSC Cruise Ship" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Cruise Details */}
                    <section id="cruise" className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12 text-gray-900">Your Cruise Awaits</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { icon: "🚢", title: "Modern Fleet", desc: "Experience state-of-the-art MSC cruise ships with world-class amenities and entertainment" },
                                    { icon: "🌍", title: "Exotic Destinations", desc: "Explore breathtaking ports of call across the Mediterranean, Caribbean, and beyond" },
                                    { icon: "⭐", title: "Exceptional Service", desc: "Enjoy personalized service from our dedicated crew ensuring your comfort and satisfaction" }
                                ].map((item, i) => (
                                    <div key={i} className="card-hover bg-gray-50 p-8 rounded-xl">
                                        <div className="text-5xl mb-4">{item.icon}</div>
                                        <h3 className="text-2xl font-bold mb-4 text-gray-900">{item.title}</h3>
                                        <p className="text-gray-700">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Experience Section */}
                    <section id="experience" className="py-20 bg-gray-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12 text-gray-900">Onboard Experience</h2>
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <h3 className="text-3xl font-bold mb-6 text-gray-900">Unforgettable Moments</h3>
                                    <ul className="space-y-4 text-gray-700">
                                        <li className="flex items-start gap-3">
                                            <span className="text-orange-600 text-2xl">✓</span>
                                            <span>World-class entertainment and live shows nightly</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <span className="text-orange-600 text-2xl">✓</span>
                                            <span>Multiple dining venues with international cuisine</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <span className="text-orange-600 text-2xl">✓</span>
                                            <span>Spa and wellness facilities for ultimate relaxation</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <span className="text-orange-600 text-2xl">✓</span>
                                            <span>Kids clubs and family activities for all ages</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <span className="text-orange-600 text-2xl">✓</span>
                                            <span>Exclusive excursions at each port of call</span>
                                        </li>
                                    </ul>
                                </div>
                                <div className="bg-white rounded-lg overflow-hidden shadow-xl">
                                    <img src="https://via.placeholder.com/500x400/F7931E/ffffff?text=Onboard+Experience" alt="Onboard Experience" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Pricing Section */}
                    <section id="pricing" className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12 text-gray-900">Pricing</h2>
                            <div className="bg-gradient-to-r from-orange-600 to-amber-500 rounded-xl p-12 text-center text-white">
                                <p className="text-lg mb-4">Starting from</p>
                                <h3 className="text-5xl font-bold mb-4">R 8,999</h3>
                                <p className="text-lg mb-8">per person in Inside Cabin</p>
                                <p className="text-sm mb-8 text-orange-50">All prices are per person, based on double occupancy. Taxes and fees may apply. Contact us for cabin upgrades and suite options.</p>
                                <a href="#newsletter" className="bg-white text-orange-600 font-bold py-3 px-8 rounded-lg hover:bg-gray-100 transition inline-block">Check Availability</a>
                            </div>
                        </div>
                    </section>

                    {/* Newsletter Section */}
                    <section id="newsletter" className="py-20 bg-gradient-to-r from-orange-600 to-amber-500 text-white">
                        <div className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-4">Don't Miss Out!</h2>
                            <p className="text-center text-orange-50 mb-8">Sign up for early booking notifications and exclusive offers</p>

                            {newsletterSubmitted ? (
                                <div className="bg-green-500 text-white p-4 rounded-lg text-center mb-8">
                                    Thank you for signing up! We'll be in touch soon.
                                </div>
                            ) : (
                                <form onSubmit={handleNewsletterSubmit} className="space-y-4">
                                    <input
                                        type="text"
                                        placeholder="Your Full Name"
                                        value={newsletter.name}
                                        onChange={(e) => setNewsletter({...newsletter, name: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg text-gray-900"
                                        required
                                    />
                                    <input
                                        type="email"
                                        placeholder="Your Email"
                                        value={newsletter.email}
                                        onChange={(e) => setNewsletter({...newsletter, email: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg text-gray-900"
                                        required
                                    />
                                    <input
                                        type="tel"
                                        placeholder="Your Phone Number"
                                        value={newsletter.phone}
                                        onChange={(e) => setNewsletter({...newsletter, phone: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg text-gray-900"
                                        required
                                    />
                                    <select
                                        value={newsletter.interest}
                                        onChange={(e) => setNewsletter({...newsletter, interest: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg text-gray-900"
                                        required
                                    >
                                        <option value="">Select Your Interest Level</option>
                                        <option value="interested">Very Interested</option>
                                        <option value="maybe">Maybe Interested</option>
                                        <option value="exploring">Just Exploring</option>
                                        <option value="group">Interested for Group</option>
                                    </select>
                                    <button type="submit" className="w-full btn-primary text-white font-bold py-3 px-8 rounded-lg">
                                        Notify Me About Availability
                                    </button>
                                </form>
                            )}
                        </div>
                    </section>

                    {/* FAQ Section */}
                    <section id="faq" className="py-20 bg-gray-50">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12 text-gray-900">Frequently Asked Questions</h2>
                            <div className="space-y-4">
                                {faqs.map((faq, i) => (
                                    <div key={i} className="bg-white rounded-lg overflow-hidden shadow">
                                        <button
                                            onClick={() => setExpandedFaq(expandedFaq === i ? -1 : i)}
                                            className="w-full text-left p-6 hover:bg-gray-50 transition"
                                        >
                                            <div className="flex justify-between items-start">
                                                <h3 className="font-bold text-lg text-gray-900">{faq.q}</h3>
                                                <span className="text-orange-600 text-2xl">{expandedFaq === i ? '−' : '+'}</span>
                                            </div>
                                        </button>
                                        {expandedFaq === i && (
                                            <div className="px-6 pb-6 pt-0 text-gray-700 border-t">
                                                {faq.a}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-20 bg-white">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-4 text-gray-900">Get in Touch</h2>
                            <p className="text-center text-gray-700 mb-12">Have questions? Our team is here to help!</p>

                            {contactSubmitted ? (
                                <div className="bg-green-500 text-white p-4 rounded-lg text-center mb-8">
                                    Thank you for your message! We'll be in touch shortly.
                                </div>
                            ) : (
                                <form onSubmit={handleContactSubmit} className="space-y-4">
                                    <input
                                        type="text"
                                        placeholder="Your Name"
                                        value={contact.name}
                                        onChange={(e) => setContact({...contact, name: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"
                                        required
                                    />
                                    <input
                                        type="email"
                                        placeholder="Your Email"
                                        value={contact.email}
                                        onChange={(e) => setContact({...contact, email: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"
                                        required
                                    />
                                    <input
                                        type="tel"
                                        placeholder="Your Phone Number"
                                        value={contact.phone}
                                        onChange={(e) => setContact({...contact, phone: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"
                                        required
                                    />
                                    <textarea
                                        placeholder="Your Message"
                                        value={contact.message}
                                        onChange={(e) => setContact({...contact, message: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900 h-32"
                                        required
                                    />
                                    <button type="submit" className="w-full btn-primary text-white font-bold py-3 px-8 rounded-lg">
                                        Send Message
                                    </button>
                                </form>
                            )}

                            <div className="mt-12 text-center">
                                <p className="text-gray-700 mb-4">Or reach us directly:</p>
                                <p className="text-2xl font-bold text-orange-600">bookings@vanwevents.co.za</p>
                            </div>
                        </div>
                    </section>

                    {/* Social Links */}
                    <section className="py-12 bg-gray-900 text-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col md:flex-row justify-between items-center">
                                <div>
                                    <h3 className="text-2xl font-bold mb-4 md:mb-0">Follow Us</h3>
                                </div>
                                <div className="flex gap-6">
                                    <a href="https://instagram.com" className="text-2xl hover:text-orange-600 transition">📱 Instagram</a>
                                    <a href="https://facebook.com" className="text-2xl hover:text-orange-600 transition">f Facebook</a>
                                    <a href="https://tiktok.com" className="text-2xl hover:text-orange-600 transition">🎵 TikTok</a>
                                </div>
                            </div>
                            <div className="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
                                <p>&copy; 2026 VanWEvents. All rights reserved. MSC Cruise Partner.</p>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
